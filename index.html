<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
<style>
/* ===== GLOBAL ===== */
body {
  font-family: system-ui, "Times New Roman", sans-serif;
  max-width: 900px;
  margin: 40px auto;
  padding: 0 16px;
  line-height: 1.5;

  background: #0f0f13;
  color: #f3f3f3;
}

/* ===== HEADER ===== */
header {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  gap: 16px;
  flex-wrap: wrap;
}

nav {
  font-size: 1.2rem;
  font-weight: 700;
  color: #ffffff;
}

nav a {
  margin-right: 12px;
  color: #8ab4ff;
  text-decoration: none;
}

nav a:hover {
  text-decoration: underline;
}

/* ===== GRID ===== */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 14px;
  margin-top: 18px;
}

/* ===== CARDS ===== */
.card {
  background: #18181f;
  border: 1px solid #2a2a35;
  border-radius: 14px;
  padding: 14px;
  box-shadow: 0 4px 18px rgba(0,0,0,0.35);
  transition: transform 0.2s ease, box-shadow 0.2s ease;
}

.card:hover {
  transform: translateY(-3px);
  box-shadow: 0 8px 24px rgba(0,0,0,0.45);
}

/* ===== IMAGE THUMBNAILS ===== */
.card img {
  max-width: 450px;
  max-height: 600px;
  width: 100%;
  height: auto;
  object-fit: cover;
  border-radius: 10px;
  display: block;
}

/* ===== LINKS ===== */
a {
  color: #7cb4ff;
}

a:hover {
  color: #a6ccff;
}

/* ===== TEXT ===== */
h2 {
  color: #ffffff;
}

.muted {
  opacity: 0.65;
}

/* ===== FOOTER ===== */
footer {
  margin-top: 40px;
  font-size: 0.95rem;
  border-top: 1px solid #2a2a35;
  padding-top: 14px;
}

/* ===== CONTACT SECTION ===== */
#contact {
  margin-top: 28px;
  background: #16161d;
  border: 1px solid #2a2a35;
  border-radius: 14px;
  padding: 16px;
}

/* ===== OPTIONAL: smooth fade in ===== */
body {
  animation: fadeIn 0.4s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(6px); }
  to   { opacity: 1; transform: translateY(0); }
}
</style>
</head>
<body>
 <section id="work">
      <div class="grid">
      <div class="card">
        <a href="https://amdi218.com/drawings/">
        <img src="https://i.ibb.co/0xC7sjs/MD.png" alt="Drawings">
        </a>
      </div>
      <div class="card">
        <a href="/animations">
        <img src="https://media4.giphy.com/media/v1.Y2lkPTc5MGI3NjExYjgwZ2pjNG1vMmRuZDB5cTExOGxpZ2tuMGJuMWU2ZDhrcXdna2M4ciZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/WTEQgDLQy831uzitmm/giphy.gif" alt="Animations">
        </a>
      </div>
      <div class="card">
        <a href="/gamesx">
        <img src="https://i.ibb.co/m5NTnSqF/Comics.png" alt="Games">
        </a>
    </div>
  </section>
  
  <footer class="muted">
    © <span id="year"></span> Amdi218
  </footer>

  <script>
    document.getElementById("year").textContent = new Date().getFullYear();
  </script>
  <!-- 18+ Age Gate (simple) -->
<style>
  #age-gate {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.85);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 999999;
  padding: 24px;

  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px); /* Safari */

  border: 4px solid #000;
  box-sizing: border-box;
  border-radius: 24px;
}
  #age-gate img {
  max-width: 260px;
  width: 100%;
  height: auto;
  display: block;
  margin: 0 auto 16px;
}
  #age-gate .box {
  max-width: 520px;
  width: 100%;
  background: #2a0f3f;
  color: #fff;
  border: 2px solid #000; /* ← added */
  border-radius: 14px;
  padding: 22px;
  font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
  box-shadow: 0 10px 35px rgba(0,0,0,0.35);
}
  #age-gate h2 { margin: 0 0 10px; font-size: 20px; }
  #age-gate p { margin: 0 0 16px; line-height: 1.4; opacity: 0.9; }
  #age-gate .row { display: flex; gap: 10px; flex-wrap: wrap; }
  #age-gate button, #age-gate a.btn {
    appearance: none;
    border: 0;
    border-radius: 10px;
    padding: 10px 14px;
    font-weight: 600;
    cursor: pointer;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    justify-content: center;
  }
  #age-yes { background: #22c55e; color: #071b0d; }
  #age-no  { background: #ef4444; color: #1b0707; }
#age-gate::before {
  content: "";
  position: absolute;
  inset: 0;
  pointer-events: none;
  border-radius: 24px;
  background: radial-gradient(
    circle at center,
    rgba(200, 170, 40, 0.18),
    transparent 70%
  );
  animation: pulse 5s ease-in-out infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 0.6; }
  50%      { opacity: 1; }
}
</style>

<div id="age-gate" role="dialog" aria-modal="true" aria-labelledby="age-title">
  <div class="box">
    <h2 id="age-title">Adults only (18+)</h2>
    <p>This website contains content intended for adults. Please confirm you are at least 18 years old.</p>
     <img src="https://media2.giphy.com/media/v1.Y2lkPTc5MGI3NjExaGUwamN2ZnhlcDRvcHNoNmVlM21yaHh5cXhqdTljM2ZzZXQ0YzF3dyZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/uuWzRLr6trSmiq6w2M/giphy.gif" alt="18+ only">
    <div class="row">
      <button id="age-yes" type="button">I’m over 18</button>
      <button id="age-no" type="button">I’m under 18</button>
    </div>
    <p style="margin-top:14px;font-size:12px;opacity:.7;">
      
    </p>
  </div>
</div>

<script>
(function () {
  const YES_COOKIE = "age_verified_18";
  const NO_COOKIE  = "age_not_verified";

  const YES_DAYS = 30;      // remember "yes" for 30 days
  const NO_MINUTES = 21;    // block after "no" for 21 minutes

  function setCookieDays(name, value, days) {
    const expires = new Date(Date.now() + days * 864e5).toUTCString();
    document.cookie = `${name}=${encodeURIComponent(value)}; expires=${expires}; path=/; SameSite=Lax`;
  }

  function setCookieMinutes(name, value, minutes) {
    const expires = new Date(Date.now() + minutes * 60 * 1000).toUTCString();
    document.cookie = `${name}=${encodeURIComponent(value)}; expires=${expires}; path=/; SameSite=Lax`;
  }

  function getCookie(name) {
    return document.cookie.split("; ").reduce((acc, part) => {
      const [k, v] = part.split("=");
      return k === name ? decodeURIComponent(v || "") : acc;
    }, "");
  }

  function showGate() {
    const gate = document.getElementById("age-gate");
    gate.style.display = "flex";
    document.body.style.overflow = "hidden";
    document.getElementById("age-yes").focus();
  }

  function hideGate() {
    const gate = document.getElementById("age-gate");
    gate.style.display = "none";
    document.body.style.overflow = "";
  }

  // If they previously clicked NO (and it's still within NO_MINUTES), redirect immediately
  if (getCookie(NO_COOKIE) === "1") {
    window.location.replace("https://www.google.com"); // change to your under-18 page if you want
    return;
  }

  // If not verified YES, show the gate
  if (getCookie(YES_COOKIE) !== "1") {
    showGate();
  }

  document.getElementById("age-yes").addEventListener("click", () => {
    setCookieDays(YES_COOKIE, "1", YES_DAYS);
    hideGate();
  });

  document.getElementById("age-no").addEventListener("click", () => {
    setCookieMinutes(NO_COOKIE, "1", NO_MINUTES);
    window.location.replace("https://www.google.com"); // change this too
  });
})();
</script>
</body>
</html>
